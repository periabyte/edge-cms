# Publishes @kalayaan/* + kalayaan to npm when a GitHub Release is published.
# Versions/changelogs are expected to already be bumped on `main` (via
# `pnpm changeset version`, see docs/releasing.md) before the release/tag is
# cut — this workflow just builds, verifies, and runs `changeset publish`,
# which is idempotent: it only publishes packages whose local version isn't
# already on npm.
#
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret involved. Each
# package has a trusted-publisher record (see docs/releasing.md) tying it to
# this exact workflow file; `id-token: write` lets npm's CLI mint a
# short-lived OIDC token for the publish automatically.
#
# Also runnable via workflow_dispatch (Actions tab → Run workflow) for
# retries without cutting a new tag/release — `changeset publish` is
# idempotent, so re-running is always safe.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag) to build and publish from — defaults to the current branch tip"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports OIDC trusted publishing (>=11.5.1)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      - name: Publish to npm
        run: pnpm changeset publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
