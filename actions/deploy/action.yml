name: "Kalayaan Deploy"
description: "Provision Cloudflare resources, run migrations, and deploy a Kalayaan project."
branding:
  icon: "upload-cloud"
  color: "orange"

inputs:
  cloudflare-api-token:
    description: "Cloudflare API token with Workers/D1/R2/KV permissions."
    required: true
  cloudflare-account-id:
    description: "Cloudflare account ID."
    required: true
  working-directory:
    description: "Directory containing cms.config.ts."
    required: false
    default: "."
  database-url:
    description: "Postgres/MySQL connection string (only for external-DB projects)."
    required: false
    default: ""
  node-version:
    description: "Node.js version to use."
    required: false
    default: "20"
  args:
    description: "Extra flags passed to `kalayaan deploy`."
    required: false
    default: ""

outputs:
  url:
    description: "The deployed Worker URL."
    value: ${{ steps.deploy.outputs.url }}

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci || npm install

    - name: Deploy
      id: deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        EDGE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        EDGE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
        DATABASE_URL: ${{ inputs.database-url }}
      run: |
        set -euo pipefail
        # Capture output so the deployed URL can be surfaced as a step output.
        npx --yes kalayaan deploy ${{ inputs.args }} | tee deploy.log
        url="$(grep -oE 'https://[a-zA-Z0-9./_-]+workers\.dev[a-zA-Z0-9./_-]*' deploy.log | head -1 || true)"
        echo "url=${url}" >> "$GITHUB_OUTPUT"
        rm -f deploy.log
